# For the annoying to look at ones

# Laptop multimedia keys for volume and LCD brightness
bindelp = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindelp = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindlp = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindlp = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindelp = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindelp = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindlp = , XF86AudioNext, exec, playerctl next
bindlp = , XF86AudioPause, exec, playerctl play-pause
bindlp = , XF86AudioPlay, exec, playerctl play-pause
bindlp = , XF86AudioPrev, exec, playerctl previous
